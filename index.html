<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת חכמה 5.0</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 20px; width: 100%; max-width: 450px; }
        h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-preview { background: #95a5a6; color: white; }
        .btn-send { background: #3498db; color: white; }
        .btn-drive { background: #2ecc71; color: white; width: 100%; }
        .status { margin-top: 10px; font-size: 0.9rem; text-align: center; min-height: 1.5rem; }
        #preview-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; position: relative; }
        .close-modal { position: absolute; top: 15px; left: 15px; cursor: pointer; font-size: 28px; color: #7f8c8d; }
    </style>
</head>
<body>

    <div id="login-section" class="card" style="text-align:center">
        <h2>ברוך הבא</h2>
        <button onclick="tokenClient.requestAccessToken()" style="background:#3498db; color:white; padding: 15px 40px; border-radius:10px; border:none; cursor:pointer; font-size:1.1rem;">התחברות מאובטחת</button>
    </div>

    <div id="main-ui" style="display:none">
        <div class="card">
            <h3>📂 העלאה לדרייב</h3>
            <input type="text" id="drive-url" placeholder="קישור לקובץ להורדה...">
            <label><input type="checkbox" id="drive-mail" checked> שלח מייל אישור בסיום</label>
            <button class="btn-drive" onclick="process('file', 'send', 'drive-url', 'st-drive')">העבר לענן שלי</button>
            <div id="st-drive" class="status"></div>
        </div>

        <div class="card">
            <h3>📖 ויקיפדיה (ערך מלא)</h3>
            <input type="text" id="wiki-q" placeholder="חפש ערך ספציפי..." list="wiki-list" oninput="fetchWiki(this.value)">
            <datalist id="wiki-list"></datalist>
            <div class="btn-group">
                <button class="btn-preview" onclick="process('wiki', 'preview', 'wiki-q', 'st-wiki')">👀 הצג ערך</button>
                <button class="btn-send" onclick="process('wiki', 'send', 'wiki-q', 'st-wiki')">📧 שלח למייל</button>
            </div>
            <div id="st-wiki" class="status"></div>
        </div>

        <div class="card">
            <h3>🔍 חיפוש Google (20 תוצאות)</h3>
            <input type="text" id="google-q" placeholder="מה תרצה למצוא ברשת?">
            <div class="btn-group">
                <button class="btn-preview" onclick="process('google', 'preview', 'google-q', 'st-google')">👀 הצג רשימה</button>
                <button class="btn-send" onclick="process('google', 'send', 'google-q', 'st-google')">📧 שלח הכל</button>
            </div>
            <div id="st-google" class="status"></div>
        </div>
    </div>

    <div id="preview-modal">
        <div class="modal-content" dir="rtl">
            <span class="close-modal" onclick="closeModal()">×</span>
            <div id="modal-body"></div>
            <hr>
            <button id="modal-send-btn" class="btn-send" style="width:100%">התוכן נראה מעולה, שלח למייל!</button>
        </div>
    </div>

<script>
    let tokenClient, access_token, userEmail;
    const CLIENT_ID = '35488533313-r07s467bb6lnd03bb03iqif0eroq6jcl.apps.googleusercontent.com';
    const WORKER_URL = 'https://wandering-boat-c837.meny85502.workers.dev/';

    function init() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/userinfo.email',
            callback: async (res) => {
                access_token = res.access_token;
                const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: `Bearer ${access_token}` } });
                const data = await info.json();
                userEmail = data.email;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
            }
        });
    }

    async function fetchWiki(q) {
        if (q.length < 2) return;
        const res = await fetch(`https://he.wikipedia.org/w/api.php?action=opensearch&format=json&origin=*&search=${encodeURIComponent(q)}`);
        const data = await res.json();
        document.getElementById('wiki-list').innerHTML = data[1].map(i => `<option value="${i}">`).join('');
    }

    async function process(type, mode, inputId, statusId) {
        const val = document.getElementById(inputId).value;
        if (!val) return;
        const status = document.getElementById(statusId);
        status.innerHTML = "⏳ עובד על זה...";

        try {
            const res = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type, value: val, mode, accessToken: access_token, userEmail, sendEmail: document.getElementById('drive-mail')?.checked })
            });
            const data = await res.json();
            status.innerHTML = "";

            if (mode === 'preview' && data.html) {
                showModal(data.html, () => process(type, 'send', inputId, statusId));
            } else if (data.success) {
                status.innerHTML = "<span style='color:green'>✅ הושלם בהצלחה!</span>";
                closeModal();
            } else {
                status.innerHTML = `<span style='color:red'>❌ ${data.error || 'שגיאה'}</span>`;
            }
        } catch (e) { status.innerHTML = "❌ תקלה בתקשורת"; }
    }

    function showModal(html, sendFn) {
        document.getElementById('modal-body').innerHTML = html;
        document.getElementById('modal-send-btn').onclick = sendFn;
        document.getElementById('preview-modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('preview-modal').style.display = 'none'; }
</script>
<script src="https://accounts.google.com/gsi/client" onload="init()" async defer></script>
</body>
</html>
