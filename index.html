<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת אישית חכמה 3.0</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; width: 100%; max-width: 450px; }
        h3 { margin: 0 0 15px 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 8px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-group { display: flex; gap: 10px; margin-top: 5px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-preview { background: #6c757d; color: white; }
        .btn-send { background: #007bff; color: white; }
        button:disabled { background: #ddd; cursor: not-allowed; color: #888; }
        .status { margin-top: 10px; font-size: 0.85rem; font-weight: bold; text-align: center; min-height: 1.2rem; }
        
        /* Modal Style */
        #preview-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .close-modal { position: absolute; top: 15px; left: 15px; cursor: pointer; font-size: 24px; color: #999; }
    </style>
</head>
<body>

    <div id="login-section" class="card" style="text-align:center">
        <h2>מערכת חכמה</h2>
        <p id="init-msg">טוען ספריות גוגל...</p>
        <button id="btn-login" disabled onclick="tokenClient.requestAccessToken()" style="background:#007bff; color:white; width:auto; padding: 12px 40px;">התחבר עם גוגל</button>
    </div>

    <div id="main-ui" class="hidden" style="display:none">
        <div class="card">
            <h3>📖 ויקיפדיה</h3>
            <input type="text" id="wiki-q" placeholder="הקלד ערך לחיפוש..." list="wiki-suggestions" oninput="fetchWikiSuggestions(this.value)">
            <datalist id="wiki-suggestions"></datalist>
            <div class="btn-group">
                <button class="btn-preview" onclick="process('wiki', 'preview')">👀 תצוגה מקדימה</button>
                <button class="btn-send" onclick="process('wiki', 'send')">📧 שלח למייל</button>
            </div>
            <div id="st-wiki" class="status"></div>
        </div>

        <div class="card">
            <h3>🔍 חיפוש גוגל</h3>
            <input type="text" id="google-q" placeholder="מה תרצה לחפש?">
            <div class="btn-group">
                <button class="btn-preview" onclick="process('search', 'preview')">👀 תצוגה מקדימה</button>
                <button class="btn-send" onclick="process('search', 'send')">📧 שלח למייל</button>
            </div>
            <div id="st-search" class="status"></div>
        </div>
    </div>

    <div id="preview-modal">
        <div class="modal-content" dir="rtl">
            <span class="close-modal" onclick="closeModal()">×</span>
            <div id="modal-body"></div>
            <hr style="margin: 20px 0;">
            <button id="modal-send-btn" class="btn-send" style="width:100%">נראה מעולה, שלח למייל</button>
        </div>
    </div>

<script>
    let tokenClient, access_token, userEmail;
    const CLIENT_ID = '35488533313-r07s467bb6lnd03bb03iqif0eroq6jcl.apps.googleusercontent.com';
    const WORKER_URL = 'https://wandering-boat-c837.meny85502.workers.dev/';

    function init() {
        try {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/userinfo.email',
                callback: async (res) => {
                    if (res.access_token) {
                        access_token = res.access_token;
                        const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { 
                            headers: { Authorization: `Bearer ${access_token}` } 
                        });
                        const userData = await info.json();
                        userEmail = userData.email;
                        document.getElementById('login-section').style.display = 'none';
                        document.getElementById('main-ui').style.display = 'block';
                    }
                }
            });
            document.getElementById('btn-login').disabled = false;
            document.getElementById('init-msg').innerText = "המערכת מוכנה להתחברות ✅";
        } catch (e) {
            document.getElementById('init-msg').innerText = "שגיאה בטעינה. וודא שאתה מחובר לאינטרנט.";
        }
    }

    async function fetchWikiSuggestions(q) {
        if (q.length < 2) return;
        const res = await fetch(`https://he.wikipedia.org/w/api.php?action=opensearch&format=json&origin=*&search=${encodeURIComponent(q)}`);
        const data = await res.json();
        document.getElementById('wiki-suggestions').innerHTML = data[1].map(i => `<option value="${i}">`).join('');
    }

    async function process(type, mode) {
        const val = document.getElementById(type === 'wiki' ? 'wiki-q' : 'google-q').value;
        if (!val) return;

        const status = document.getElementById(type === 'wiki' ? 'st-wiki' : 'st-search');
        status.innerHTML = "⏳ בתהליך...";

        try {
            const res = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type, value: val, mode, accessToken: access_token, userEmail })
            });
            const data = await res.json();

            if (mode === 'preview' && data.html) {
                showModal(data.html, () => process(type, 'send'));
                status.innerText = "";
            } else if (data.success) {
                status.innerHTML = "<span style='color:green'>✅ המייל נשלח בהצלחה!</span>";
                closeModal();
            } else {
                status.innerHTML = `<span style='color:red'>❌ ${data.error || 'שגיאה לא ידועה'}</span>`;
            }
        } catch (e) { status.innerText = "❌ תקלה בתקשורת עם השרת"; }
    }

    function showModal(html, sendFn) {
        document.getElementById('modal-body').innerHTML = html;
        document.getElementById('modal-send-btn').onclick = sendFn;
        document.getElementById('preview-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('preview-modal').style.display = 'none'; }
</script>
<script src="https://accounts.google.com/gsi/client" onload="init()" async defer></script>
</body>
</html>
