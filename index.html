<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת ענן V24.0</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☁️</text></svg>">
    
    <style>
        :root { --p: #007bff; --s: #28a745; --bg: #f4f7f9; --g: #4285F4; --w: #364043; }
        body { font-family: 'Segoe UI', system-ui; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; width: 100%; max-width: 450px; border-top: 5px solid var(--p); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; color: white; font-size: 1rem; }
        .status { margin-top: 10px; font-size: 0.9rem; text-align: center; font-weight: bold; }
        .progress-bar { width: 0%; height: 10px; background: var(--s); border-radius: 5px; margin-top: 5px; transition: 0.3s; }
    </style>
</head>
<body>
    <div id="login-section" class="card">
        <h2 style="text-align:center; margin-top:0;">כניסה למערכת</h2>
        <button onclick="tokenClient.requestAccessToken()" style="background:var(--p);">התחבר לגוגל דרייב ומייל</button>
    </div>

    <div id="main-ui" style="display:none">
        
        <div class="card" style="border-top-color: var(--g);">
            <h3 style="margin-top:0;">🔍 סוכן חיפוש חכם</h3>
            <p style="font-size:0.85rem; color:#555;">קבל את 20 התוצאות הראשונות ישר למייל שלך.</p>
            <input type="text" id="search-query" placeholder="מה לחפש בגוגל?">
            <button style="background:var(--g);" onclick="doSearch()">חפש ושלח למייל</button>
            <div id="st-search" class="status"></div>
        </div>

<div class="card" style="border-top-color: #364043; position: relative;">
            <h3 style="margin-top:0;">📖 סוכן ויקיפדיה למייל</h3>
            <p style="font-size:0.85rem; color:#555;">התחל להקליד ובחר ערך מהרשימה:</p>
            <input type="text" id="wiki-query" placeholder="חפש ערך..." oninput="getWikiSuggestions(this.value)" autocomplete="off">
            <div id="wiki-suggestions" style="position: absolute; background: white; width: calc(100% - 40px); border: 1px solid #ddd; border-radius: 0 0 8px 8px; max-height: 200px; overflow-y: auto; display: none; z-index: 100;"></div>
            <button style="background:#364043;" onclick="doWiki()">שלח ערך מלא למייל</button>
            <div id="st-wiki" class="status"></div>
        </div>

        <div class="card" style="border-top-color: #ffc107;">
            <h3 style="margin-top:0;">🚀 העלאה ישירה (קבצי ענק)</h3>
            <input type="text" id="folder-id" placeholder="ID של תיקיית יעד בדרייב (אופציונלי)">
            <input type="file" id="file-input">
            <button style="background:#ffc107; color:#000;" onclick="uploadLargeFile()">העלה קובץ ישירות לדרייב</button>
            <div style="background:#eee; border-radius:5px; overflow:hidden;"><div id="p-bar" class="progress-bar"></div></div>
            <div id="up-status" class="status"></div>
        </div>

        <div class="card" style="border-top-color: var(--s);">
            <h3 style="margin-top:0;">🔗 הזרמה מקישור אינטרנט</h3>
            <input type="text" id="d-url" placeholder="הדבק קישור ישיר (PDF/וידאו/וכו')...">
            <button style="background:var(--s);" onclick="doWork('file', 'd-url')">העבר לדרייב ושלח מייל</button>
            <div id="st-url" class="status"></div>
        </div>
    </div>

<script>
    let tokenClient, access_token, userEmail;
    const WORKER = 'https://wandering-boat-c837.meny85502.workers.dev/';

    function init() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: '35488533313-r07s467bb6lnd03bb03iqif0eroq6jcl.apps.googleusercontent.com',
            scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/userinfo.email',
            callback: async (res) => {
                access_token = res.access_token;
                const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: `Bearer ${access_token}` } });
                const data = await info.json();
                userEmail = data.email;
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                fetch(WORKER, { method: 'POST', body: JSON.stringify({ accessToken: access_token, userEmail: userEmail, folderId: document.getElementById('folder-id').value }) });
            }
        });
    }

    async function doSearch() {
        const query = document.getElementById('search-query').value;
        const status = document.getElementById('st-search');
        if (!query) return alert("הכנס מילת חיפוש");
        status.innerText = "⏳ מחפש בגוגל ומעצב מייל...";
        try {
            const response = await fetch(WORKER, {
                method: 'POST',
                body: JSON.stringify({ type: 'search', query: query, accessToken: access_token, userEmail: userEmail })
            });
            const data = await response.json();
            status.innerHTML = data.success ? "✅ המייל נשלח אליך בהצלחה!" : "❌ " + data.error;
        } catch (e) { status.innerText = "❌ שגיאת רשת"; }
    }

    async function doWiki() {
        const query = document.getElementById('wiki-query').value;
        const status = document.getElementById('st-wiki');
        if (!query) return alert("הכנס שם ערך");
        status.innerText = "⏳ מושך מידע מוויקיפדיה ושולח מייל...";
        try {
            const response = await fetch(WORKER, {
                method: 'POST',
                body: JSON.stringify({ type: 'wikipedia', query: query, accessToken: access_token, userEmail: userEmail })
            });
            const data = await response.json();
            status.innerHTML = data.success ? "✅ הערך המלא בדרך למייל שלך!" : "❌ " + data.error;
        } catch (e) { status.innerText = "❌ שגיאת רשת"; }
    }

    async function doWork(type, inputId) {
        const val = document.getElementById(inputId).value;
        const status = document.getElementById('st-url');
        const folderId = document.getElementById('folder-id').value;
        if (!val) return;
        status.innerText = "⏳ מזרים לדרייב...";
        try {
            const response = await fetch(WORKER, {
                method: 'POST', body: JSON.stringify({ type, value: val, accessToken: access_token, userEmail, folderId })
            });
            const data = await response.json();
            status.innerHTML = data.success ? "✅ בוצע ונשלח מייל!" : "❌ " + data.error;
        } catch (e) { status.innerText = "❌ שגיאת רשת"; }
    }

    async function uploadLargeFile() {
        const file = document.getElementById('file-input').files[0];
        const folder = document.getElementById('folder-id').value;
        const status = document.getElementById('up-status');
        if (!file) return;

        status.innerText = "⏳ מתחיל העלאה ישירה...";
        const form = new FormData();
        form.append('metadata', new Blob([JSON.stringify({ name: file.name, parents: folder ? [folder] : [] })], { type: 'application/json' }));
        form.append('file', file);

        const xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart');
        xhr.setRequestHeader('Authorization', 'Bearer ' + access_token);
        
        xhr.upload.onprogress = (e) => {
            const percent = (e.loaded / e.total) * 100;
            document.getElementById('p-bar').style.width = percent + '%';
            status.innerText = `מעלה: ${Math.round(percent)}%`;
        };
        xhr.onload = () => { status.innerHTML = xhr.status === 200 ? "✅ הקובץ הענק בדרייב!" : "❌ שגיאה: " + xhr.status; };
        xhr.send(form);
    }
</script>
<script src="https://accounts.google.com/gsi/client" onload="init()" async defer></script>
</body>
</html>
