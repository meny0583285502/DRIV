<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת ענן V26</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; width: 100%; max-width: 400px; position: relative; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #364043; color: white; }
        #wiki-suggestions { 
            position: absolute; top: 100%; left: 20px; right: 20px; 
            background: white; border: 1px solid #ccc; border-top: none; 
            z-index: 9999; display: none; max-height: 150px; overflow-y: auto;
            box-shadow: 0 4px 5px rgba(0,0,0,0.2);
        }
        .sugg-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; text-align: right; }
        .sugg-item:hover { background: #eee; }
    </style>
    
    <script>
        // פונקציות עזר - חייבות להיות למעלה
        async function getWikiSuggestions(val) {
            const box = document.getElementById('wiki-suggestions');
            if (val.length < 2) { box.style.display = 'none'; return; }
            
            try {
                const r = await fetch(`https://he.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(val)}&limit=8&format=json&origin=*`);
                const d = await r.json();
                const titles = d[1];
                
                if (titles.length > 0) {
                    box.innerHTML = titles.map(t => `<div class="sugg-item" onclick="selectWiki('${t.replace(/'/g, "\\'")}')">${t}</div>`).join('');
                    box.style.display = 'block';
                } else { box.style.display = 'none'; }
            } catch (e) { console.error(e); }
        }

        function selectWiki(t) {
            document.getElementById('wiki-query').value = t;
            document.getElementById('wiki-suggestions').style.display = 'none';
        }

        let tokenClient, access_token, userEmail;
        const WORKER = 'https://wandering-boat-c837.meny85502.workers.dev/';

        function init() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: '35488533313-r07s467bb6lnd03bb03iqif0eroq6jcl.apps.googleusercontent.com',
                scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/userinfo.email',
                callback: async (res) => {
                    access_token = res.access_token;
                    const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: `Bearer ${access_token}` } });
                    const data = await info.json();
                    userEmail = data.email;
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('main-ui').style.display = 'block';
                }
            });
        }

        async function doWiki() {
            const q = document.getElementById('wiki-query').value;
            const st = document.getElementById('st-wiki');
            if (!q || !access_token) return alert("התחבר ובחר ערך");
            st.innerText = "⏳ שולח...";
            try {
                const res = await fetch(WORKER, {
                    method: 'POST',
                    body: JSON.stringify({ type: 'wikipedia', query: q, accessToken: access_token, userEmail: userEmail })
                });
                const data = await res.json();
                st.innerText = data.success ? "✅ נשלח למייל!" : "❌ " + data.error;
            } catch (e) { st.innerText = "❌ שגיאה"; }
        }
    </script>
</head>
<body>
    <div id="login-section" class="card">
        <button onclick="tokenClient.requestAccessToken()" style="background:#007bff;">התחבר למערכת</button>
    </div>

    <div id="main-ui" style="display:none">
        <div class="card">
            <h3>📖 סוכן ויקיפדיה</h3>
            <input type="text" id="wiki-query" placeholder="הקלד ערך..." oninput="getWikiSuggestions(this.value)" autocomplete="off">
            <div id="wiki-suggestions"></div>
            <button onclick="doWiki()">שלח למייל</button>
            <div id="st-wiki" style="margin-top:10px; font-weight:bold;"></div>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" onload="init()" async defer></script>
</body>
</html>
