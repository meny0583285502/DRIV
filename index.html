<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מעלה קבצים עוקף חסימות</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        #status { font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h2>העלאה מהירה לדרייב</h2>
    <div id="login-area">
        <button id="btn-login">שלב 1: התחברות לגוגל</button>
    </div>
    <div id="upload-area" class="hidden">
        <input type="text" id="url-input" placeholder="הדבק כאן קישור לקובץ">
        <button id="btn-upload">שלב 2: העבר לדרייב</button>
        <div id="status">מחובר ומוכן</div>
    </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
    let tokenClient;
    let accessToken = null;

    // --- הגדרות חשובות ---
    const CLIENT_ID = '35488533313-r07s467bb6lnd03bb03iqif0eroq6jcl.apps.googleusercontent.com'; 
    const WORKER_URL = 'https://wandering-boat-c837.meny85502.workers.dev'; 
    // ----------------------

    function init() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: 'https://www.googleapis.com/auth/drive.file',
            callback: (res) => {
                accessToken = res.access_token;
                document.getElementById('login-area').className = 'hidden';
                document.getElementById('upload-area').className = '';
            },
        });
    }

    document.getElementById('btn-login').onclick = () => tokenClient.requestAccessToken();

    document.getElementById('btn-upload').onclick = async () => {
        const fileUrl = document.getElementById('url-input').value;
        const status = document.getElementById('status');
        if (!fileUrl) return;

        status.innerText = "⏳ הענן מושך את הקובץ...";

        try {
            // משתמש בוורקר כדי לעקוף את החסימה של המחשב והדפדפן
            const response = await fetch(`${WORKER_URL}?url=${encodeURIComponent(fileUrl)}`);
            const blob = await response.blob();
            const fileName = fileUrl.split('/').pop().split('?')[0] || 'file';

            status.innerText = "📤 מעלה לגוגל דרייב...";

            const metadata = { name: fileName, mimeType: blob.type };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], {type: 'application/json'}));
            form.append('file', blob);

            const upRes = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + accessToken },
                body: form
            });

            if (upRes.ok) status.innerHTML = "<b style='color:green'>✅ הצלחה! הקובץ בדרייב.</b>";
            else throw new Error("נכשל בהעלאה");
        } catch (e) {
            status.innerHTML = "<b style='color:red'>❌ שגיאה: " + e.message + "</b>";
        }
    };

    window.onload = init;
</script>
</body>
</html>
