<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מערכת אישית חכמה</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 1.5rem; border-radius: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; width: 350px; text-align: center; }
        input { width: 100%; padding: 0.8rem; margin: 10px 0; border: 1px solid #ccc; border-radius: 0.5rem; box-sizing: border-box; }
        button { width: 100%; padding: 0.8rem; background: #007bff; color: white; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        .status { margin-top: 10px; font-size: 0.85rem; color: #555; }
    </style>
</head>
<body>

<div id="container">
    <div id="login-card" class="card">
        <h2>מערכת אישית</h2>
        <button id="btn-login">התחברות לגוגל</button>
        <p id="init-status">טוען ספריות...</p>
    </div>

    <div id="main-actions" class="hidden">
        <div class="card">
            <h3>📂 העלאה לדרייב</h3>
            <input type="text" id="file-url" placeholder="קישור לקובץ">
            <button onclick="doAction('file', 'file-url', 's1')">העבר לדרייב ומייל</button>
            <div id="s1" class="status"></div>
        </div>

        <div class="card">
            <h3>📖 ויקיפדיה למייל</h3>
            <input type="text" id="wiki-q" placeholder="ערך לחיפוש">
            <button onclick="doAction('wiki', 'wiki-q', 's2')" style="background:#28a745">שלח ערך</button>
            <div id="s2" class="status"></div>
        </div>

        <div class="card">
            <h3>🔍 חיפוש גוגל</h3>
            <input type="text" id="google-q" placeholder="מה לחפש?">
            <button onclick="doAction('search', 'google-q', 's3')" style="background:#6f42c1">שלח תוצאות</button>
            <div id="s3" class="status"></div>
        </div>
    </div>
</div>

<script>
    let client;
    let access_token = null;
    const WORKER = 'https://wandering-boat-c837.meny85502.workers.dev/';

    function initClient() {
        client = google.accounts.oauth2.initTokenClient({
            client_id: '35488533313-r07s467bb6lnd03bb03iqif0eroq6jcl.apps.googleusercontent.com',
            scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/gmail.send',
            callback: (tokenRes) => {
                access_token = tokenRes.access_token;
                document.getElementById('login-card').classList.add('hidden');
                document.getElementById('main-actions').classList.remove('hidden');
            },
        });
        document.getElementById('init-status').innerText = "מוכן להתחברות ✅";
    }

    document.getElementById('btn-login').onclick = () => {
        if (client) client.requestAccessToken();
    };

    async function doAction(type, inputId, statusId) {
        const val = document.getElementById(inputId).value;
        const status = document.getElementById(statusId);
        if (!val) return;

        status.innerText = "⌛ מעבד...";
        try {
            const res = await fetch(WORKER, {
                method: 'POST',
                body: JSON.stringify({ type, value: val, accessToken: access_token })
            });
            const data = await res.json();
            status.innerHTML = data.success ? "<b style='color:green'>✅ בוצע!</b>" : "❌ " + data.error;
        } catch (e) {
            status.innerText = "❌ תקלה בתקשורת";
        }
    }
</script>
<script src="https://accounts.google.com/gsi/client" onload="initClient()" async defer></script>

</body>
</html>
